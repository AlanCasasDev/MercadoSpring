spring.application.name=supermercado_spring

spring.datasource.url=jdbc:mysql://localhost:3306/supermercado_spring?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

#JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
